# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: bg-night-planner
metadata:
  template: bg-night-planner@0.0.1-beta
services:
  web:
    project: .
    language: js
    host: staticwebapp
  api:
    project: ./api
    language: js
    host: function
hooks:
  postdeploy:
    shell: pwsh
    run: |
      echo "Deployment completed successfully!"
      echo "Web App URL: $env:AZURE_STATICWEBAPP_DEFAULT_HOST_NAME"
